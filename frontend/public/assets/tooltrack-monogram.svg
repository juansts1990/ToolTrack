<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGradTT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a4d4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo con gradiente -->
  <rect width="120" height="120" rx="20" fill="url(#bgGradTT)"/>
  
  <!-- Letras TT estilizadas -->
  <g>
    <!-- Primera T -->
    <text x="20" y="75" 
          font-family="'Segoe UI', 'Arial', sans-serif" 
          font-size="60" 
          font-weight="800" 
          fill="#14b8a6" 
          letter-spacing="-2">
      T
    </text>
    
    <!-- Segunda T -->
    <text x="55" y="75" 
          font-family="'Segoe UI', 'Arial', sans-serif" 
          font-size="60" 
          font-weight="800" 
          fill="#2dd4bf" 
          letter-spacing="-2">
      T
    </text>
  </g>
  
  <!-- Detalle decorativo debajo -->
  <line x1="30" y1="85" x2="90" y2="85" stroke="#14b8a6" stroke-width="3" opacity="0.5"/>
</svg>
